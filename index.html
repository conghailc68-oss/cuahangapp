<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI ARTIFACTS - Cửa Hàng AI Công Hải</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #131314;
      --surface: #201f20;
      --primary: #a9c7ff;
      --video-accent: #E100FF;
      --prompt-gold: #FFD700;
      --success-green: #00FFAB;
      --on-surface: #e5e2e3;
      --on-surface-variant: #c0c6d6;
      --border-glass: rgba(255,255,255,0.12);
    }
    body {
      background: var(--bg);
      color: var(--on-surface);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 50% 0%, rgba(169,199,255,0.10) 0%, transparent 50%),
        radial-gradient(circle at 100% 50%, rgba(225,0,255,0.05) 0%, transparent 50%);
    }
    .font-sora { font-family: 'Sora', sans-serif; }
    .glass-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .rim-light { box-shadow: inset 0 1px 1px 0 rgba(255,255,255,0.2); }

    /* HEADER */
    header {
      position: fixed; top: 0; width: 100%; z-index: 50;
      background: rgba(19,19,20,0.80); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-glass);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; height: 64px; gap: 1rem;
    }
    .header-logo { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
    .header-logo h1 {
      font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--video-accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-nav { display: none; align-items: center; gap: 1.5rem; }
    @media(min-width:768px){ .header-nav { display: flex; } }
    .nav-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: none; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
      color: var(--on-surface-variant); transition: color .2s; letter-spacing: .03em;
    }
    .nav-btn:hover, .nav-btn.active { color: var(--primary); }
    .nav-btn.active svg { fill: currentColor; }
    .header-search { display: flex; justify-content: flex-end; flex: 1; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.5rem; border-radius: 50%;
      color: var(--primary); transition: background .2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.05); }

    /* MAIN */
    main { padding-top: 5rem; padding-bottom: 2rem; }

    /* HERO */
    .hero {
      margin-top: 1.5rem; margin-bottom: 3rem;
      max-width: 80rem; margin-left: auto; margin-right: auto;
      padding: 0 1rem;
    }
    .hero h2 { font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 600; color: var(--primary); margin-bottom: 0.5rem; }
    .hero p { color: var(--on-surface-variant); font-size: 1rem; }
    @media(min-width:768px){ .hero h2 { font-size: 1.875rem; } .hero { margin-top: 3.5rem; } }

    /* SECTION */
    .sec { margin-bottom: 4rem; max-width: 80rem; margin-left: auto; margin-right: auto; padding: 0 1rem; }
    .section-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .section-bar { width: 4px; height: 24px; border-radius: 4px; display: inline-block; flex-shrink: 0; }
    .section-header h3 {
      font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em; color: var(--on-surface);
    }
    @media(min-width:768px){ .section-header h3 { font-size: 1.25rem; } }

    /* ═══ VIDEO SECTION ═══ */
    .video-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
    @media(min-width:640px){ .video-grid { grid-template-columns: 1fr 1fr; } }
    @media(min-width:1024px){ .video-grid { grid-template-columns: repeat(3, 1fr); } }

    .video-card {
      border-radius: 1rem; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.10);
      display: flex; flex-direction: column;
      transition: transform .25s, box-shadow .25s;
    }
    .video-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }

    .vc-img { position: relative; height: 10rem; overflow: hidden; flex-shrink: 0; }
    .vc-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s; }
    .video-card:hover .vc-img img { transform: scale(1.07); }
    .vc-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(19,19,20,0.9) 0%, rgba(19,19,20,0.15) 55%, transparent 100%);
    }
    .vc-badge { position: absolute; top: 0.6rem; right: 0.6rem; z-index: 2; }
    .badge {
      padding: 0.15rem 0.6rem; border-radius: 9999px;
      font-size: 0.62rem; font-weight: 700; letter-spacing: .06em;
      backdrop-filter: blur(6px);
    }
    .badge-purple { background: rgba(225,0,255,0.2); border: 1px solid var(--video-accent); color: var(--video-accent); }
    .badge-gold   { background: rgba(255,215,0,0.2);  border: 1px solid var(--prompt-gold);  color: var(--prompt-gold); }
    .badge-blue   { background: rgba(169,199,255,0.2);border: 1px solid var(--primary);      color: var(--primary); }
    .badge-green  { background: rgba(0,255,171,0.2);  border: 1px solid var(--success-green);color: var(--success-green); }

    .vc-body { padding: 1rem; display: flex; flex-direction: column; flex: 1; }

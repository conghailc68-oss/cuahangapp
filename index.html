<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI ARTIFACTS - Cửa Hàng AI Công Hải</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Giữ nguyên toàn bộ CSS bạn đã có (không thay đổi) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #131314;
      --surface: #201f20;
      --primary: #a9c7ff;
      --video-accent: #E100FF;
      --prompt-gold: #FFD700;
      --success-green: #00FFAB;
      --on-surface: #e5e2e3;
      --on-surface-variant: #c0c6d6;
      --border-glass: rgba(255,255,255,0.12);
    }
    /* ... (phần CSS còn lại giữ nguyên như bạn đưa) ... */
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="var(--primary)" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <h1 class="font-sora">AI ARTIFACTS</h1>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="scrollToSection('section-prompt')">Market</button>
    <button class="nav-btn" onclick="scrollToSection('section-prompt')">Prompts</button>
    <button class="nav-btn" onclick="scrollToSection('section-video')">Video</button>
    <button class="nav-btn" onclick="scrollToSection('section-action')">Actions</button>
    <button class="nav-btn" onclick="scrollToSection('section-support')">Support</button>
  </nav>
  <div class="header-search">
    <button class="icon-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</header>

<main>
  <!-- Các phần nội dung của bạn giữ nguyên (Hero, Prompt, Video, Action, Payment) -->
  <!-- Chỉ cần đảm bảo các id khớp với hàm scrollToSection -->

  <div class="sec" id="section-prompt">...</div>
  <div class="sec" id="section-video">...</div>
  <div class="sec" id="section-action">...</div>
  <div class="sec" id="section-support">...</div>
</main>

<!-- Footer và Bottom Nav giữ nguyên -->

<script>
// ==================== HÀM SCROLL ĐÃ SỬA ====================
function scrollToSection(sectionId) {
  const element = document.getElementById(sectionId);
  if (element) {
    element.scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  } else {
    console.warn(`Không tìm thấy section: ${sectionId}`);
  }
}

// Đóng các lỗi console khác nếu có
document.addEventListener('DOMContentLoaded', () => {
  console.log('%cAI ARTIFACTS loaded successfully!', 'color: #a9c7ff; font-weight: bold');
});
</script>

</body>
</html>
